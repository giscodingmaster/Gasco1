    <style>

            padding: 0 4px; font-size: 11px; font-weight: bold; color: #333; white-space: nowrap; text-align: center;
        }
        .leaflet-tooltip-top:before, .leaflet-tooltip-bottom:before, .leaflet-tooltip-left:before, .leaflet-tooltip-right:before { display: none !important; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .search-control {
            position: absolute; top: 10px; left: 50px; z-index: 1000;
            background: white; padding: 5px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            display: flex; gap: 5px; width: 300px;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(234, 179, 8, 0); } 100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0); } }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/"
  }

</script>
</head>
<body>
    <div id="root"></div>
    
    <script type="module">
        import React from 'react';
        import ReactDOM from 'react-dom/client';
        const e = React.createElement;

        const firebaseConfig = {
          apiKey: "AIzaSyA2VDO_vXe8q5Pfon2BGPoL3tD0IKbkBhg",
          authDomain: "students-grade-management.firebaseapp.com",
          databaseURL: "https://students-grade-management-default-rtdb.firebaseio.com",
          projectId: "students-grade-management",
          storageBucket: "students-grade-management.firebasestorage.app",
          messagingSenderId: "888502840503",
          appId: "1:888502840503:web:e82b7ca4e38b13e4053132",
          measurementId: "G-C4GT0V5C0V"
        };
        
        if (!window.firebase.apps.length) window.firebase.initializeApp(firebaseConfig);
        if (window.proj4) window.proj4.defs("EPSG:32636", "+proj=utm +zone=36 +datum=WGS84 +units=m +no_defs");

        // --- SAFE KEY GENERATOR ---
        function generateKey(crn, clientName) {
            const safeCrn = cleanCRN(crn);
            const safeName = (clientName || "Unknown")
                .toString()
                .replace(/[.#$/\[\]]/g, '') 
                .replace(/\s+/g, '_');      
            return `${safeCrn}_${safeName}`;
        }

        function cleanCRN(value) {
            if (!value) return "UNKNOWN";
            let str = String(value).replace(/\./g, '');
            const match = str.match(/^(\d+)/);
            return match ? match[1] : str;
        }

        function convertToUTM(lat, lon) {
            if (!window.proj4) return { x: 0, y: 0 };
            const result = window.proj4("EPSG:4326", "EPSG:32636", [lon, lat]);
            return { x: result[0], y: result[1] };
        }

        function extractCoordinates(urlInput) {
            if (!urlInput) return null;
            let input = decodeURIComponent(urlInput).replace(/\s/g, '');
            const patterns = [
                /^(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)$/,
                /!3d(-?\d+(?:\.\d+)?)!4d(-?\d+(?:\.\d+)?)/,
                /@(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)/,
                /q=(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)/,
                /ll=(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)/
            ];
            for (const pattern of patterns) {
                const match = input.match(pattern);
                if (match && match.length >= 3) {
                    const lat = parseFloat(match[1]);
                    const lon = parseFloat(match[2]);
                    if (!isNaN(lat) && !isNaN(lon) && lat >= -90 && lat <= 90) return { lat, lon };
                }
            }
            return null;
        }

        const excelDateToJSDate = (serial) => {
            if (!serial) return '';
            if (typeof serial === 'string') return serial;
            const utc_days  = Math.floor(serial - 25569);
            const utc_value = utc_days * 86400;                                        
            const date_info = new Date(utc_value * 1000);
            return date_info.toLocaleDateString('ar-EG');
        };

        const COLS = {
            CLIENT: 'اسم المنشأة', 
            SAP_CODE: 'كود ساب إيجاس', 
            PETRO_CODE: 'كود بتروتريد',
            CRN: 'CRN', 
            GOV: 'اسم الشيت',
            ACTIVITY: 'نوع النشاط',
            CAPACITY: 'كميات الغاز الصادر بها موافقة', 
            START_DATE: 'تاريخ بداية العقد',
            CLIENT_STATUS: 'حالة العميل (ملاحظات)' 
        };

        const StatsCard = ({ title, value, icon, color, loading }) => 
            e('div', { className: "bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex items-center justify-between" },
                e('div', null,
                    e('p', { className: "text-slate-500 text-xs font-semibold uppercase tracking-wider" }, title),
                    loading ? 
                        e('div', { className: "flex items-center gap-2 mt-2" }, e('div', { className: "spinner" }), e('span', { className: "text-xs text-slate-400" }, "تحميل...")) :
                        e('h3', { className: "text-2xl font-bold text-slate-800 mt-1" }, value)
                ),
                e('div', { className: `w-10 h-10 rounded-full flex items-center justify-center ${color}` },
                    e('i', { className: `fa-solid ${icon} text-white` })
                )
            );

        const ProgressBar = ({ total, current }) => {
            const percent = total > 0 ? Math.round((current / total) * 100) : 0;
            return e('div', { className: "w-full bg-slate-200 rounded-full h-2.5 mt-2 overflow-hidden" },
                e('div', { className: "bg-blue-600 h-2.5 rounded-full transition-all duration-500", style: { width: `${percent}%` } })
            );
        };

        // =========================================================
        // FIX & REVIEW DATA MAP (Team Copy with Context Gap Fix)
        // =========================================================
        const FixDataMap = ({ data, onClose, onDelete, showAlert }) => {
            const mapRef = React.useRef(null);
            const markersGroupRef = React.useRef(null);
            const markersRef = React.useRef({});
            const [searchTerm, setSearchTerm] = React.useState("");
            const isFirstLoad = React.useRef(true);

            React.useEffect(() => {
                window.GHand_UpdateLoc = (key, lat, lng) => {
                    const utm = convertToUTM(lat, lng);
                    const updates = {
                        latitude: lat.toFixed(6),
                        longitude: lng.toFixed(6),
                        utmX: utm.x.toFixed(2),
                        utmY: utm.y.toFixed(2),
                        timestamp: new Date().toISOString()
                    };
                    window.firebase.database().ref(`collectedLocations/${key}`).update(updates)
                        .then(() => showAlert("✅ تم تحديث الموقع بنجاح!"))
                        .catch(err => alert("❌ خطأ: " + err.message));
                };

                // تحديث ميزة المراجعة لطلب ملاحظات عند اختيار غير مطابق أو غير موجود
                window.GHand_UpdateReview = (key, status) => {
                    let notes = "";
                    if (status === 'غير مطابق' || status === 'غير موجود بالورق') {
                        notes = prompt(`الرجاء كتابة ملاحظة أو سبب لاختيار "${status}"\n(يمكنك تركه فارغاً والضغط على OK):`);
                        if (notes === null) return; // المستخدم ضغط Cancel
                    }

                    window.firebase.database().ref(`collectedLocations/${key}`).update({
                        paperMapReview: status,
                        reviewNotes: notes, // إضافة حقل الملاحظات هنا
                        reviewTimestamp: new Date().toISOString()
                    })
                    .then(() => showAlert(`✅ تم تحديد الحالة: ${status}`))
                    .catch(err => alert("❌ خطأ: " + err.message));
                };

                window.GHand_DeleteFixMode = (id) => {
                    if (confirm("⚠️ هل أنت متأكد من حذف هذا الموقع نهائياً؟")) {
                        onDelete(id);
                    }
                };

                window.GHand_EnableDrag = (key) => {
                    const marker = markersRef.current[key];
                    if (marker) {
                        marker.dragging.enable();
                        marker.setIcon(L.divIcon({ 
                            className: 'custom-div-icon', 
                            html: `<div style="background-color: #f59e0b; width: 18px; height: 18px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 10px yellow; animation: pulse 1s infinite;"></div>`,
                            iconSize: [18, 18], iconAnchor: [9, 9] 
                        }));
                        marker.closePopup();
                        marker.bindPopup(`
                            <div class="text-center font-bold font-sans">
                                <div>Drag to new location...</div>
                                <div class="text-xs text-amber-600 mb-2">(اسحب الدبوس للمكان الجديد)</div>
                                <button class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded shadow text-xs font-bold transition-colors" onclick="window.GHand_SaveDrag('${key}')">
                                    <i class="fa-solid fa-save"></i> حفظ الموقع الجديد
                                </button>
                            </div>
                        `).openPopup();
                    }
                };

                window.GHand_SaveDrag = (key) => {
                    const marker = markersRef.current[key];
                    if (marker) {
                        const pos = marker.getLatLng();
                        window.GHand_UpdateLoc(key, pos.lat, pos.lng);
                        marker.dragging.disable();
                        marker.closePopup();
                    }
                };

                return () => {
                    delete window.GHand_UpdateLoc;
                    delete window.GHand_UpdateReview;
                    delete window.GHand_EnableDrag;
                    delete window.GHand_SaveDrag;
                    delete window.GHand_DeleteFixMode;
                };
            }, [onDelete, showAlert]);

            React.useEffect(() => {
                if (!document.getElementById('fix-map')) return;

                const googleSatNoLabels = L.tileLayer('http://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{ maxZoom: 21, subdomains:['mt0','mt1','mt2','mt3'] });

                const map = L.map('fix-map', { center: [26.8206, 30.8025], zoom: 6, layers: [googleSatNoLabels] });
                mapRef.current = map;

                markersGroupRef.current = L.featureGroup().addTo(map);

                return () => {
                    map.remove();
                    mapRef.current = null;
                    isFirstLoad.current = true;
                };
            }, []);

            React.useEffect(() => {
                if (!mapRef.current || !markersGroupRef.current) return;

                const map = mapRef.current;
                const markersGroup = markersGroupRef.current;

                markersGroup.clearLayers();
                markersRef.current = {};

                data.forEach(item => {
                    const lat = parseFloat(item.latitude);
                    const lon = parseFloat(item.longitude);
                    if(!isNaN(lat) && !isNaN(lon)) {
                        const reviewStatus = item.paperMapReview || 'لم يتم المراجعة';
                        let reviewColor = '#3b82f6'; 
                        if (reviewStatus === 'مطابق للورق') reviewColor = '#10b981';
                        if (reviewStatus === 'غير مطابق') reviewColor = '#ef4444';
                        if (reviewStatus === 'غير موجود بالورق') reviewColor = '#6b7280';

                        const markerHtml = `<div style="background-color: ${reviewColor}; width: 14px; height: 14px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 4px black;"></div>`;
                        const icon = L.divIcon({ className: 'custom-div-icon', html: markerHtml, iconSize: [14, 14], iconAnchor: [7, 7] });
                        
                        const marker = L.marker([lat, lon], { icon: icon });
                        
                        // تجهيز الملاحظات للعرض في البوب أب إن وجدت
                        const notesHtml = item.reviewNotes ? `<div class="mt-2 text-xs text-red-600 bg-red-50 p-2 rounded border border-red-100"><b>ملاحظة المراجع:</b> ${item.reviewNotes}</div>` : '';
                        
                        marker.bindPopup(`
                            <div class="text-right dir-rtl font-sans min-w-[240px]">
                                <h3 class="font-bold text-base text-blue-800 border-b pb-1 mb-1">${item.clientName}</h3>
                                <p class="text-xs text-gray-700"><b>Code:</b> ${item.commercialCode}</p>
                                <p class="text-xs text-gray-700 font-mono"><b>CRN:</b> ${item.crn}</p>
                                
                                <div class="mt-3 pt-2 border-t">
                                    <div class="text-xs font-bold text-gray-700 mb-1 text-center">المراجعة الورقية: <span style="color:${reviewColor}">${reviewStatus}</span></div>
                                    ${notesHtml}
                                    <div class="flex gap-1 mt-2">
                                        <button onclick="window.GHand_UpdateReview('${item.firebaseId}', 'مطابق للورق')" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white text-[10px] font-bold py-1.5 rounded transition-colors">مطابق</button>
                                        <button onclick="window.GHand_UpdateReview('${item.firebaseId}', 'غير مطابق')" class="flex-1 bg-red-500 hover:bg-red-600 text-white text-[10px] font-bold py-1.5 rounded transition-colors">غير مطابق</button>
                                        <button onclick="window.GHand_UpdateReview('${item.firebaseId}', 'غير موجود بالورق')" class="flex-1 bg-gray-500 hover:bg-gray-600 text-white text-[10px] font-bold py-1.5 rounded transition-colors">غير موجود</button>
                                    </div>
                                </div>

                                <div class="mt-2 pt-2 border-t flex gap-2 justify-center">
                                    <button onclick="window.GHand_EnableDrag('${item.firebaseId}')" class="flex-1 bg-amber-500 hover:bg-amber-600 text-white text-xs font-bold py-1.5 px-2 rounded shadow transition-colors">
                                        <i class="fa-solid fa-arrows-up-down-left-right"></i> تعديل المكان
                                    </button>
                                    <button onclick="window.GHand_DeleteFixMode('${item.firebaseId}')" class="flex-1 bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 text-xs font-bold py-1.5 px-2 rounded shadow transition-colors">
                                        <i class="fa-solid fa-trash"></i> حذف السجل
                                    </button>
                                </div>
                            </div>
                        `);
                        
                        markersGroup.addLayer(marker);
                        markersRef.current[item.firebaseId] = marker; 
                    }
                });

                if (isFirstLoad.current && data.length > 0) {
                    map.fitBounds(markersGroup.getBounds(), { padding: [50, 50] });
                    isFirstLoad.current = false;
                }
            }, [data]);

            const handleSearch = (e) => {
                e.preventDefault();
                if (!searchTerm || !mapRef.current) return;
                const lower = searchTerm.toLowerCase();
                
                const found = data.find(d => 
                    d.clientName.toLowerCase().includes(lower) || 
                    String(d.commercialCode).includes(lower) || 
                    String(d.crn).includes(lower)
                );

                if (found && markersRef.current[found.firebaseId]) {
                    const marker = markersRef.current[found.firebaseId];
                    mapRef.current.setView(marker.getLatLng(), 19); 
                    marker.openPopup();
                } else {
                    alert("غير موجود (Not found)");
                }
            };

            return e('div', { className: "fixed inset-0 bg-black/90 z-50 flex flex-col p-4 fade-in" },
                e('div', { className: "bg-white rounded-xl shadow-2xl flex-1 flex flex-col overflow-hidden relative" },
                    e('div', { className: "p-4 border-b flex justify-between items-center bg-amber-50" },
                        e('div', { className: "flex items-center gap-3" },
                            e('h2', { className: "font-bold text-lg text-amber-800" }, e('i', { className: "fa-solid fa-list-check mr-2" }), "Fix & Review Data (تعديل ومراجعة)"),
                        ),
                        e('button', { onClick: onClose, className: "w-8 h-8 rounded-full bg-slate-200 hover:bg-slate-300 flex items-center justify-center transition-colors" }, e('i', { className: "fa-solid fa-times" }))
                    ),
                    e('div', { className: "flex-1 relative" }, 
                        e('div', { className: "search-control flex gap-1" },
                             e('input', { 
                                type: "text", 
                                className: "flex-1 px-3 py-1.5 text-sm border rounded outline-none text-right dir-rtl", 
                                placeholder: "بحث بالاسم أو CRN...",
                                value: searchTerm,
                                onChange: e => setSearchTerm(e.target.value),
                                onKeyDown: e => e.key === 'Enter' && handleSearch(e)
                             }),
                             e('button', { onClick: handleSearch, className: "bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-700" }, e('i', { className: "fa-solid fa-search" }))
                        ),
                        e('div', { id: "fix-map" })
                    ),
                    e('div', { className: "p-3 bg-amber-50 border-t flex justify-center gap-6 text-xs text-amber-900 font-bold" },
                        e('div', { className: "flex items-center gap-1" }, e('span', { className: "w-3 h-3 rounded-full bg-emerald-500 inline-block" }), "مطابق"),
                        e('div', { className: "flex items-center gap-1" }, e('span', { className: "w-3 h-3 rounded-full bg-red-500 inline-block" }), "غير مطابق"),
                        e('div', { className: "flex items-center gap-1" }, e('span', { className: "w-3 h-3 rounded-full bg-gray-500 inline-block" }), "غير موجود"),
                        e('div', { className: "flex items-center gap-1" }, e('span', { className: "w-3 h-3 rounded-full bg-blue-500 inline-block" }), "لم يُراجع")
                    )
                )
            );
        };

        // =========================================================
        // ADMIN MAP
        // =========================================================
        const AdminMap = ({ data, onClose, onDelete }) => {
            const [showLabels, setShowLabels] = React.useState(false);
            const mapRef = React.useRef(null);
            const markersGroupRef = React.useRef(null);
            const fileInputRef = React.useRef(null);
            const isFirstLoad = React.useRef(true);

            React.useEffect(() => {
                window.GHand_DeletePoint = (id) => {
                    if (confirm("هل أنت متأكد من حذف هذا الموقع؟")) onDelete(id);
                };
                return () => { delete window.GHand_DeletePoint; };
            }, [onDelete]);

            React.useEffect(() => {
                if (!document.getElementById('admin-map')) return;
                
                const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OSM' });
                const googleSat = L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}',{ maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] });
                const esriSat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles &copy; Esri' });

                const map = L.map('admin-map', { center: [26.8206, 30.8025], zoom: 6, layers: [esriSat] });
                mapRef.current = map;

                const baseMaps = { "Esri Satellite": esriSat, "Google Hybrid": googleSat, "Street Map": osmLayer };
                L.control.layers(baseMaps).addTo(map);

                markersGroupRef.current = L.featureGroup().addTo(map);
                
                return () => {
                    map.remove();
                    mapRef.current = null;
                    isFirstLoad.current = true;
                };
            }, []);

            React.useEffect(() => {
                if (!mapRef.current || !markersGroupRef.current) return;
                
                const map = mapRef.current;
                const markers = markersGroupRef.current;
                markers.clearLayers();

                data.forEach(item => {
                    const lat = parseFloat(item.latitude);
                    const lon = parseFloat(item.longitude);
                    if(!isNaN(lat) && !isNaN(lon)) {
                        const isActive = item.status === 'Active';
                        const color = isActive ? '#16a34a' : '#dc2626';
                        const markerHtml = `<div style="background-color: ${color}; width: 14px; height: 14px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 4px black;"></div>`;
                        const icon = L.divIcon({ className: 'custom-div-icon', html: markerHtml, iconSize: [14, 14], iconAnchor: [7, 7] });
                        
                        const marker = L.marker([lat, lon], { icon: icon })
                            .bindPopup(`
                                <div class="text-right dir-rtl font-sans min-w-[200px]">
                                    <h3 class="font-bold text-base border-b pb-1 mb-1">${item.clientName}</h3>
                                    <p class="text-sm text-gray-700"><b>Sheet:</b> ${item.governorate}</p>
                                    <p class="text-sm text-blue-700 font-mono"><b>CRN:</b> ${item.crn}</p>
                                    <p class="text-sm mt-2">Status: <span class="px-2 py-0.5 rounded text-white text-xs" style="background-color:${color}">${item.status || 'Active'}</span></p>
                                    <div class="mt-3 border-t pt-2">
                                        <button onclick="window.GHand_DeletePoint('${item.firebaseId}')" class="w-full bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 text-xs font-bold py-1.5 px-2 rounded flex items-center justify-center gap-1 transition-colors">
                                            <i class="fa-solid fa-trash-can"></i> Delete Location
                                        </button>
                                    </div>
                                </div>
                            `);
                        if (showLabels) marker.bindTooltip(item.clientName, { permanent: true, direction: 'top', offset: [0, -10], className: 'map-text-label' });
                        markers.addLayer(marker);
                    }
                });
                
                if (isFirstLoad.current && data.length > 0) {
                    map.fitBounds(markers.getBounds(), { padding: [50, 50] });
                    isFirstLoad.current = false;
                }
            }, [data, showLabels]);

            const handleLayerUpload = async (e) => {
                const file = e.target.files[0];
                if (!file || !mapRef.current) return;
                const map = mapRef.current;
                try {
                    let geojson = null;
                    alert("Loading layer...");
                    if (file.name.endsWith('.zip')) {
                        const buffer = await file.arrayBuffer();
                        geojson = await window.shp(buffer);
                    } else if (file.name.endsWith('.json') || file.name.endsWith('.geojson')) {
                        const text = await file.text();
                        geojson = JSON.parse(text);
                    } else {
                        alert("Unsupported format. Use .zip or .geojson");
                        return;
                    }
                    if (geojson) {
                        const layer = L.geoJSON(geojson, {
                            style: { color: '#facc15', weight: 2, opacity: 0.8, fillOpacity: 0.2, fillColor: '#facc15' },
                            onEachFeature: (feature, layer) => {
                                const props = feature.properties || {};
                                const keys = Object.keys(props);
                                const crnKey = keys.find(k => k.toUpperCase() === 'CRN');
                                const crnValue = crnKey ? props[crnKey] : "Not Found";
                                layer.bindPopup(`<div class="text-left font-sans text-sm"><div class="font-bold border-b pb-1 mb-1">Feature</div><div class="text-blue-700"><b>CRN:</b> ${crnValue}</div></div>`);
                            }
                        }).addTo(map);
                        map.fitBounds(layer.getBounds());
                    }
                } catch (err) { alert("Error: " + err.message); }
                e.target.value = null;

        const MainApp = () => {
            const { useState, useEffect, useMemo } = React;

                petroCode: row[COLS.PETRO_CODE] || '',

                governorate: row[COLS.GOV] || 'Unknown',

                try {
                    const text = await navigator.clipboard.readText();
                    handleLinkChange(text);

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsLoading(true);
                setUploadProgress("Preparing file...");
                
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const wb = XLSX.read(evt.target.result, { type: 'array' });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const json = XLSX.utils.sheet_to_json(ws); 
                        if (!json.length) throw new Error("Empty file");

                        const processed = json.map((row, idx) => {
                            const newRow = {};
                            Object.keys(row).forEach(key => {
                                const safeKey = key.replace(/[.#$/\[\]]/g, '_').replace(/[\x00-\x1F\x7F]+/g, ' ').trim();
                                newRow[safeKey] = row[key];
                            });
                            newRow.UniqueID = idx;
                            return newRow;
                        });

                        const dbRef = window.firebase.database().ref('masterReference/data');
                        const batchSize = 500;
                        const totalBatches = Math.ceil(processed.length / batchSize);

                        await window.firebase.database().ref('masterReference/updatedAt').set(new Date().toISOString());
                        await window.firebase.database().ref('masterReference/fileName').set(file.name);

                        for (let i = 0; i < totalBatches; i++) {
                            const start = i * batchSize;
                            const end = start + batchSize;
                            const chunk = processed.slice(start, end);
                            const updates = {};
                            chunk.forEach((item, idx) => {
                                updates[start + idx] = item; 
                            });
                            setUploadProgress(`Uploading batch ${i + 1} of ${totalBatches}...`);
                            await dbRef.update(updates);
                        }

                        setUploadProgress(null);
                        setIsLoading(false);
                        showAlert("تم تحديث قاعدة البيانات بنجاح (Batch Mode)");
                    } catch (err) { 
                        showAlert("خطأ: " + err.message, 'error'); 
                        setUploadProgress(null);
                        setIsLoading(false); 
                    }
                };
                reader.readAsArrayBuffer(file);
            };

                e.preventDefault();

                const key = generateKey(norm.crn, norm.clientName);

                const payload = {
                    masterRefId: norm.UniqueID, 
                    clientName: norm.clientName,
                    commercialCode: norm.commercialCode,
                    petroCode: norm.petroCode,
                    crn: norm.crn,
                    activity: norm.activity,
                    governorate: norm.governorate,

                    longitude: coords.lon.toFixed(6),

                    utmY: utm ? utm.y.toFixed(2) : '',

                    timestamp: new Date().toISOString()

                window.firebase.database().ref(`collectedLocations/${key}`).update(payload)

            const resetForm = () => { 
                setSelIndex(''); setGMapLink(''); setCoords(null); setUtm(null); setEditId(null); setSearchTerm('');

                const idx = refData.findIndex(r => generateKey(cleanCRN(r[COLS.CRN]), r[COLS.CLIENT]) === rec.firebaseId);
                
                if (idx !== -1) {
                    setSelIndex(idx.toString());
                    setSelGov(normalizeKeys(refData[idx]).governorate);
                    localStorage.setItem('ghand_selGov', normalizeKeys(refData[idx]).governorate);
                    setStatus(rec.status || 'Active'); 
                    handleLinkChange(`${rec.latitude}, ${rec.longitude}`);
                    setEditId(rec.firebaseId);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    const fallbackIdx = refData.findIndex(r => cleanCRN(r[COLS.CRN]) === rec.crn);
                    if (fallbackIdx !== -1) {
                         setSelIndex(fallbackIdx.toString());
                         setSelGov(normalizeKeys(refData[fallbackIdx]).governorate);
                         handleLinkChange(`${rec.latitude}, ${rec.longitude}`);
                         setEditId(rec.firebaseId); 
                    } else {
                        showAlert("هذا العميل غير موجود في ملف الإكسل الأصلي", "error");
                    }
                }
            };

            const handleDelete = (id) => { window.firebase.database().ref(`collectedLocations/${id}`).remove(); };
            
            // --- UPDATED EXCEL EXPORT WITH REVIEW STATUS AND NOTES ---
            const exportExcel = () => {
                const output = refData.map(row => {
                    const rowCRN = cleanCRN(row[COLS.CRN]);
                    let match = collected.find(c => c.crn === rowCRN && c.clientName === row[COLS.CLIENT]);
                    if (!match) {
                        match = collected.find(c => c.crn === rowCRN);
                    }

                    return { 
                        ...row, 
                        'Status': match?.status || 'Pending', 
                        'المراجعة الورقية': match?.paperMapReview || 'Pending', 
                        'ملاحظات المراجعة': match?.reviewNotes || '', // عمود الملاحظات الجديد
                        'Lat': match?.latitude || '', 
                        'Lon': match?.longitude || '', 
                        'UTM_X': match?.utmX || '', 
                        'UTM_Y': match?.utmY || '', 
                        'Date': match ? new Date(match.timestamp).toLocaleDateString() : '' 
                    };
                });
                const ws = XLSX.utils.json_to_sheet(output);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Data");
                XLSX.writeFile(wb, "Gasco_Final_Export.xlsx");
            };

            // --- UPDATED GEOJSON EXPORT WITH REVIEW STATUS AND NOTES ---
            const exportGeoJSON = () => {
                if (collected.length === 0) {
                    showAlert("لا توجد بيانات لتصديرها", "error");
                    return;
                }
                const features = collected.map(c => {
                    const lat = parseFloat(c.latitude);
                    const lon = parseFloat(c.longitude);
                    if (isNaN(lat) || isNaN(lon)) return null;
                    return {
                        type: "Feature",
                        geometry: { type: "Point", coordinates: [lon, lat] },
                        properties: {
                            client: c.clientName,
                            sap: c.commercialCode,
                            crn: c.crn,
                            sheet: c.governorate,
                            status: c.status,
                            paper_review: c.paperMapReview || 'Pending',
                            review_notes: c.reviewNotes || '', // الملاحظات للـ GeoJSON
                            activity: c.activity,
                            utm_x: c.utmX,
                            utm_y: c.utmY,
                            date: c.timestamp
                        }
                    };
                }).filter(f => f !== null);
                const geoJSON = { type: "FeatureCollection", features };
                const blob = new Blob([JSON.stringify(geoJSON)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "G_Hand_Locations.geojson";
                a.click();

                    ),

                    e('div', { className: "flex gap-2" },

                            ) :
                            filteredClients.map(c => 
                                e('div', { 
                                    key: c.originalIndex,
                                    onClick: () => setSelIndex(c.originalIndex.toString()),
                                    className: `p-2 text-sm cursor-pointer border-b last:border-0 hover:bg-blue-50 transition-colors ${selIndex === c.originalIndex.toString() ? 'bg-blue-100 border-l-4 border-l-blue-500' : ''}`

                    e('div', { className: "grid grid-cols-2 gap-y-2 text-sm" },

                        e('div', null, e('span', { className: "text-slate-500 text-xs block" }, "CRN"), e('span', { className: "font-mono font-bold text-indigo-600" }, selectedItem.crn)),

                },

                    e('p', { className: "text-sm text-slate-600 font-medium" }, "تحديث قاعدة البيانات (Excel)"),

                    isLoading && e('div', { className: "absolute inset-0 bg-white/80 flex items-center justify-center flex-col" }, 
                        e('div', { className: "spinner mb-2" }),
                        uploadProgress && e('span', { className: "text-xs font-bold text-blue-600" }, uploadProgress)
                    )
                )
            );

            const DataTable = () => e('div', { className: "glass-panel rounded-xl overflow-hidden flex flex-col h-[650px]" },
                e('div', { className: "p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50" },
                    e('div', { className: "flex bg-slate-200 p-1 rounded-lg" },
                        ['pending', 'collected'].map(tab => 
                            e('button', {
                                key: tab,
                                onClick: () => setActiveTab(tab),
                                className: `px-4 py-1.5 text-sm font-medium rounded-md transition-all ${activeTab === tab ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`
                            }, tab === 'pending' ? "المتبقي" : "تم الجمع")
                        )
                    ),
                    isAdmin && e('div', { className: "flex gap-2" },
                        e('button', { onClick: exportGeoJSON, className: "text-blue-600 hover:bg-blue-50 px-3 py-1.5 rounded-lg text-sm font-bold transition-colors" }, 
                            e('i', { className: "fa-solid fa-globe mr-2" }), "GeoJSON"
                        ),
                        e('button', { onClick: exportExcel, className: "text-emerald-600 hover:bg-emerald-50 px-3 py-1.5 rounded-lg text-sm font-bold transition-colors" }, 
                            e('i', { className: "fa-solid fa-file-excel mr-2" }), "Excel"
                        )
                    )
                ),
                e('div', { className: "flex-1 overflow-auto" },
                    e('table', { className: "w-full text-right" },
                        e('thead', { className: "bg-slate-50 sticky top-0 z-10" },
                            e('tr', null,
                                e('th', { className: "p-3 text-xs font-bold text-slate-500" }, "#"),
                                e('th', { className: "p-3 text-xs font-bold text-slate-500" }, "العميل"),
                                e('th', { className: "p-3 text-xs font-bold text-slate-500" }, "CRN / SAP"),
                                activeTab === 'collected' && e('th', { className: "p-3 text-xs font-bold text-slate-500" }, "المراجعة"),
                                activeTab === 'collected' && e('th', { className: "p-3 text-xs font-bold text-slate-500" }, "الحالة"),
                                e('th', { className: "p-3 text-xs font-bold text-slate-500" }, "الشيت"), 
                                activeTab === 'collected' && e('th', { className: "p-3 text-xs font-bold text-slate-500" }, "إجراءات")
                            )
                        ),
                        e('tbody', { className: "divide-y divide-slate-100" },
                            (activeTab === 'collected' ? collected : filteredClients.filter(c => !c.isDone)).slice(0, 100).map((row, i) => 
                                e('tr', { key: i, className: "hover:bg-blue-50/50 transition-colors" },
                                    e('td', { className: "p-3 text-xs text-slate-400 font-mono" }, i + 1),
                                    e('td', { className: "p-3" },
                                        e('div', { className: "font-semibold text-sm text-slate-700" }, row.clientName),
                                        e('div', { className: "text-xs text-slate-400" }, row.activity)
                                    ),
                                    e('td', { className: "p-3" },
                                        e('span', { className: "bg-slate-100 text-slate-600 px-2 py-0.5 rounded text-xs font-mono block mb-1" }, row.crn),
                                        e('span', { className: "text-xs text-gray-400 font-mono" }, row.commercialCode)
                                    ),
                                    // حالة المراجعة الورقية
                                    activeTab === 'collected' && e('td', { className: "p-3" },
                                        e('span', { className: `px-2 py-1 rounded text-[10px] font-bold ${row.paperMapReview === 'مطابق للورق' ? 'bg-emerald-100 text-emerald-700' : row.paperMapReview === 'غير مطابق' ? 'bg-red-100 text-red-700' : row.paperMapReview === 'غير موجود بالورق' ? 'bg-gray-200 text-gray-700' : 'bg-blue-50 text-blue-600'}` }, 
                                            row.paperMapReview || 'لم يتم المراجعة'
                                        )
                                    ),
                                    activeTab === 'collected' && e('td', { className: "p-3" },
                                        e('span', { className: `px-2 py-1 rounded text-[10px] font-bold ${row.status === 'Active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}` }, 
                                            row.status === 'Active' ? 'يعمل' : 'متوقف'
                                        )
                                    ),
                                    e('td', { className: "p-3 text-sm text-slate-600" }, row.governorate),
                                    activeTab === 'collected' && e('td', { className: "p-3 flex gap-2" },
                                        e('button', { onClick: () => setQrData(row), className: "w-8 h-8 rounded-full bg-blue-50 text-blue-600 hover:bg-blue-100 flex items-center justify-center transition-colors" }, e('i', { className: "fa-solid fa-qrcode" })),
                                        e('button', { onClick: () => handleEdit(row), className: "w-8 h-8 rounded-full bg-amber-50 text-amber-600 hover:bg-amber-100 flex items-center justify-center transition-colors" }, e('i', { className: "fa-solid fa-pen" })),
                                        isAdmin && e('button', { onClick: () => handleDelete(row.firebaseId), className: "w-8 h-8 rounded-full bg-red-50 text-red-600 hover:bg-red-100 flex items-center justify-center transition-colors" }, e('i', { className: "fa-solid fa-trash" }))
                                    )
                                )
                            )
                        )
                    )
                )
            );

            return e(React.Fragment, null,
                e('nav', { className: "bg-slate-900 text-white sticky top-0 z-40 shadow-lg" },
                    e('div', { className: "container mx-auto px-4 py-3 flex justify-between items-center" },
                        e('div', { className: "flex items-center gap-3" },
                            e('div', { className: "w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center font-bold" }, "G"),
                            e('h1', { className: "text-lg font-bold tracking-wide" }, "G Hand")
                        ),
                        e('div', { className: "flex gap-2" },
                            e('button', { 
                                onClick: () => setShowFixMap(true),
                                className: "text-xs font-semibold bg-amber-600 hover:bg-amber-700 px-3 py-1.5 rounded-full transition-colors flex items-center gap-2"
                            }, e('i', { className: "fa-solid fa-list-check" }), "Fix & Review Data"),

                            isAdmin && e('button', { 
                                onClick: () => setShowMap(true),
                                className: "text-xs font-semibold bg-emerald-600 hover:bg-emerald-700 px-3 py-1.5 rounded-full transition-colors flex items-center gap-2"
                            }, e('i', { className: "fa-solid fa-map" }), "Admin Map"),
                            
                            e('button', { 
                                onClick: () => isAdmin ? setIsAdmin(false) : setShowLogin(true),
                                className: "text-xs font-semibold bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-full transition-colors"
                            }, isAdmin ? "Logout" : "Login")
                        )
                    )
                ),

                e('div', { className: "container mx-auto p-4 max-w-7xl" },
                    e('div', { className: "grid grid-cols-2 md:grid-cols-4 gap-4 mb-6" },
                        e(StatsCard, { title: "إجمالي العملاء", value: refData.length, icon: "fa-database", color: "bg-blue-500", loading: isLoading }),
                        e(StatsCard, { title: "تم الجمع", value: collected.length, icon: "fa-check-circle", color: "bg-emerald-500" }),
                        e(StatsCard, { title: "المتبقي", value: Math.max(0, refData.length - collected.length), icon: "fa-clock", color: "bg-amber-500" }),
                        e(StatsCard, { title: "نسبة الإنجاز", value: `${refData.length > 0 ? Math.round((collected.length/refData.length)*100) : 0}%`, icon: "fa-chart-pie", color: "bg-purple-500" })
                    ),

                    e('div', { className: "grid grid-cols-1 lg:grid-cols-12 gap-6" },
                        e('div', { className: "lg:col-span-4 space-y-4" },
                            alertMsg && e('div', { className: `p-3 rounded-lg text-sm font-semibold text-center fade-in ${alertMsg.type === 'error' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}` }, alertMsg.message),
                            e(Sidebar)
                        ),
                        e('div', { className: "lg:col-span-8" },
                            e(DataTable)
                        )
                    )
                ),

                showLogin && e('div', { className: "fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 fade-in" },
                    e('div', { className: "bg-white p-8 rounded-2xl shadow-2xl w-96 text-center" },
                        e('h2', { className: "text-xl font-bold mb-6" }, "Admin Login"),
                        e('input', { type: "password", className: "w-full p-3 border rounded-xl mb-4 focus:ring-2 focus:ring-blue-500 outline-none", placeholder: "Password", value: passInput, onChange: e => setPassInput(e.target.value) }),
                        e('div', { className: "flex gap-2" },
                            e('button', { onClick: () => setShowLogin(false), className: "flex-1 py-2 text-slate-500 hover:bg-slate-100 rounded-lg" }, "Cancel"),
                            e('button', { onClick: (e) => { e.preventDefault(); if(passInput==='admin123') { setIsAdmin(true); setShowLogin(false); } else alert('Wrong!'); }, className: "flex-1 py-2 bg-blue-600 text-white rounded-lg font-bold" }, "Login")
                        )
                    )
                ),

                showMap && e(AdminMap, { data: collected, onClose: () => setShowMap(false), onDelete: handleDelete }),
                
                showFixMap && e(FixDataMap, { data: collected, onClose: () => setShowFixMap(false), onDelete: handleDelete, showAlert: showAlert }),

                qrData && e('div', { className: "fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4", onClick: () => setQrData(null) },
                    e('div', { className: "bg-white p-6 rounded-3xl shadow-2xl max-w-sm w-full text-center printable-area", onClick: e => e.stopPropagation() },
                        e('div', { className: "w-16 h-1 bg-slate-200 rounded-full mx-auto mb-6" }),
                        e('h3', { className: "text-lg font-bold text-slate-800" }, qrData.clientName),
                        e('div', { className: "bg-slate-50 rounded-xl p-4 my-4" },
                            e('canvas', { id: "qr-canvas", className: "mx-auto mix-blend-multiply" })
                        ),
                        e('div', { className: "grid grid-cols-2 gap-2 text-sm text-left font-mono text-slate-600 bg-slate-50 p-3 rounded-lg" },
                            e('div', null, `LAT: ${qrData.latitude}`),
                            e('div', null, `LON: ${qrData.longitude}`),
                            e('div', null, `CRN: ${qrData.crn}`),
                            e('div', null, `X: ${qrData.utmX}`)
                        ),
                        e('button', { onClick: () => window.print(), className: "w-full mt-6 py-3 bg-slate-900 text-white rounded-xl font-bold hover:bg-black transition-colors no-print" }, "Print Ticket")
                    )
                )
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(React.StrictMode, null, e(MainApp)));
    </script>
</body>
</html>
